<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga de Pagos a Proveedores</title>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            padding: 35px 40px;
            max-width: 700px;
            width: 100%;
        }

        /* --- CABECERA CON LOGO --- */
        .company-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 22px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f3f8;
            flex-wrap: wrap;
        }
        #companyLogo {
            max-height: 70px;
            width: auto;
            max-width: 180px;
            object-fit: contain;
            border-radius: 6px;
        }
        .header-text {
            flex: 1;
        }
        .header-text h1 {
            font-size: 24px;
            color: #1a2b4a;
            font-weight: 700;
            margin: 0 0 4px 0;
        }
        .header-text .subtitle {
            color: #5e6f8d;
            font-size: 14px;
            margin: 0;
            padding: 0;
            border: none;
        }

        /* --- FORMULARIO --- */
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 500;
            color: #1f2a44;
            margin-bottom: 5px;
            font-size: 14px;
        }
        label .required {
            color: #e74c3c;
            margin-left: 3px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d7e2;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafcff;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #1a2b4a;
            box-shadow: 0 0 0 3px rgba(26, 43, 74, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn-submit {
            background: #1a2b4a;
            color: white;
            border: none;
            padding: 13px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background: #2a3f64;
        }
        .btn-submit:active {
            transform: scale(0.98);
        }
        .btn-submit:disabled {
            background: #a0b0c8;
            cursor: not-allowed;
        }
        .message {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }
        .message.success {
            display: block;
            background: #e6f7e6;
            color: #1d6b2b;
            border: 1px solid #b8e0b8;
        }
        .message.error {
            display: block;
            background: #fde8e8;
            color: #a13232;
            border: 1px solid #f5c2c2;
        }
        .info-device {
            margin-top: 20px;
            font-size: 12px;
            color: #3d4a62;
            background: #f2f5fa;
            padding: 12px 16px;
            border-radius: 8px;
            word-break: break-all;
            display: none;
            border: 1px solid #e9edf4;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .info-device strong {
            color: #1a2b4a;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }
        @media (max-width: 550px) {
            .row {
                flex-direction: column;
                gap: 0;
            }
            .container {
                padding: 20px;
            }
            .company-header {
                flex-direction: column;
                text-align: center;
            }
            #companyLogo {
                max-height: 60px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="company-header">
            <img src="logo.jpeg" alt="Logo de la empresa" id="companyLogo" onerror="this.style.display='none'">
            <div class="header-text">
                <h1>🧾 Carga de Pago</h1>
                <div class="subtitle">Completa los datos para que el equipo de pagos procese la operación.</div>
            </div>
        </div>

        <form id="paymentForm">
            <div class="form-group">
                <label for="proveedor">Proveedor <span class="required">*</span></label>
                <input type="text" id="proveedor" placeholder="Ej: Suministros S.A." required>
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="monto">Monto ($) <span class="required">*</span></label>
                    <input type="number" id="monto" placeholder="0.00" step="0.01" min="0.01" required>
                </div>
                <div class="form-group">
                    <label for="fecha">Fecha de pago <span class="required">*</span></label>
                    <input type="date" id="fecha" required>
                </div>
            </div>
            <div class="form-group">
                <label for="concepto">Concepto <span class="required">*</span></label>
                <input type="text" id="concepto" placeholder="Ej: Factura nº 1234" required>
            </div>
            <div class="form-group">
                <label for="factura">Nº Factura / Referencia</label>
                <input type="text" id="factura" placeholder="Opcional">
            </div>
            <div class="form-group">
                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" placeholder="Detalles adicionales..."></textarea>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Enviar pago</button>
        </form>

        <div id="message" class="message"></div>
        <div id="deviceInfo" class="info-device"></div>
    </div>
    <script src="config.js"></script>
